<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEDIA PREVIEW</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --card-bg: rgba(255, 255, 255, 0.03);
      --accent: #007aff;
      --text: #f5f5f7;
      --text-muted: #86868b;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 60px 20px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 80px;
    }

    h1 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .title-main {
      font-size: 2.5rem;
      font-weight: 300;
      background: linear-gradient(180deg, #fff 0%, #aaa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    section {
      margin-bottom: 80px;
    }

    h2.section-title {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 32px;
      padding-left: 16px;
      border-left: 2px solid var(--accent);
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 32px;
    }

    @media (max-width: 500px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      background: rgba(255, 255, 255, 0.05);
    }

    .card-content {
      padding: 24px;
    }

    .card h3 {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 12px;
      color: #fff;
    }

    video {
      width: 100%;
      aspect-ratio: 16/9;
      display: block;
      background: #000;
      border-bottom: 1px solid var(--glass-border);
    }

    .audio-player-container {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: 12px;
      margin-top: 8px;
    }

    audio {
      width: 100%;
      height: 36px;
      display: block;
    }

    .meta {
      margin-top: 16px;
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tag {
      padding: 4px 10px;
      background: var(--glass);
      border-radius: 6px;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    footer {
      text-align: center;
      margin-top: 80px;
      color: var(--text-muted);
      font-size: 0.8rem;
      opacity: 0.5;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      animation: fadeIn 0.8s ease-out both;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .audio-section .card:nth-child(1) { animation-delay: 0.3s; }
    .audio-section .card:nth-child(2) { animation-delay: 0.4s; }

  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Video & Audio</h1>
      <div class="title-main">Media Preview</div>
    </header>

    <section id="videos">
      <h2 class="section-title">Videos</h2>
      <div class="grid">
        <div class="card">
          <video controls preload="metadata">
            <source src="showa2026.mp4" type="video/mp4">
          </video>
          <div class="card-content">
            <h3>昭和の日2026完成版</h3>
            <div class="meta">
              <span>showa2026.mp4</span>
              <span class="tag">Video</span>
              <span>44 MB</span>
            </div>
          </div>
        </div>

        <div class="card">
          <video controls preload="metadata">
            <source src="mugen-green.mp4" type="video/mp4">
          </video>
          <div class="card-content">
            <h3>無限グリーンCM</h3>
            <div class="meta">
              <span>mugen-green.mp4</span>
              <span class="tag">Video</span>
              <span>19 MB</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="audio" class="audio-section">
      <h2 class="section-title">Audio</h2>
      <div class="grid">
        <div class="card">
          <div class="card-content">
            <h3>むげんグリーン！ (男子)</h3>
            <div class="audio-player-container">
              <audio controls>
                <source src="むげんグリーン！ (男子).mp3" type="audio/mpeg">
              </audio>
            </div>
            <div class="meta">
              <span>むげんグリーン！ (男子).mp3</span>
              <span class="tag">Audio</span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-content">
            <h3>むげんグリーン！ (女子)</h3>
            <div class="audio-player-container">
              <audio controls>
                <source src="むげんグリーン！ (女子).mp3" type="audio/mpeg">
              </audio>
            </div>
            <div class="meta">
              <span>むげんグリーン！ (女子).mp3</span>
              <span class="tag">Audio</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      &copy; 2026 Media Preview Site
    </footer>
  </div>
</body>
</html>
